<app-header title="Perfil"></app-header>

<ion-content>
  <div class="profile-container">
    <!--<img [src]="user.image" alt="Profile Image" class="profile-image">-->
    <h2>{{ user.name }}</h2>
    <p>{{ user.email }}</p>
  </div>

  <div class="products-container">
    <h3>Mis Publicaciones</h3>
    <div class="table-responsive">
      <ion-grid>
        <ion-row>
          <ion-col>#</ion-col>
          <ion-col>Marca</ion-col>
          <ion-col>Modelo</ion-col>
          <ion-col>Año</ion-col>
          <ion-col>Precio</ion-col>
          <ion-col>Kilometraje</ion-col>
          <ion-col>Acciones</ion-col>
        </ion-row>
        <ion-row *ngFor="let product of products; let i = index">
          <ion-col>{{ i + 1 }}</ion-col>
          <ion-col>{{ product.marca }}</ion-col>
          <ion-col>{{ product.modelo }}</ion-col>
          <ion-col>{{ product.anio }}</ion-col>
          <ion-col>{{ product.precio | currency }}</ion-col>
          <ion-col>{{ product.kilometraje | number }}</ion-col>
          <ion-col>
            <ion-button (click)="addUpdateProduct(product)" color="primary">Editar</ion-button>
            <ion-button (click)="confirmDeleteProduct(product)" color="danger">Eliminar</ion-button>
          </ion-col>
        </ion-row>
      </ion-grid>
    </div>
  </div>
</ion-content>
